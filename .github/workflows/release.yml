name: Automatically publish to Modrinth
on:
  release:
    types: [published]
jobs:
  publish-to-modrinth:
    if: github.repository_owner == 'topnotchfoxy'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: github-actions
    permissions:
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Java JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          java-package: "jre"
      - name: Build Pack
        run: |
          pushd Pakku/
          MC_VERSION=$(jq -r '.mc_versions' pakku-lock.json)
          echo "MC_VERSION=$MC_VERSION" >> $GITHUB_ENV
          PACK_VERSION=$(jq -r '.version' pakku.json)
          echo "PACK_VERSION=$PACK_VERSION" >> $GITHUB_ENV
          PACK_NAME=$(jq -r '.name' pakku.json)
          echo "PACK_NAME=$PACK_NAME" >> $GITHUB_ENV
          wget https://github.com/juraj-hrivnak/Pakku/releases/download/v1.4.0/pakku.jar
          java -jar pakku.jar export
          popd
      - name: Publish to Modrinth
        uses: Kira-NT/mc-publish@v3.3
        with:
          name: MC${{ env.MC_VERSION }}-${{ env.PACK_VERSION }}
          modrinth-id: Ohwb2cTF
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: ./Pakku/build/modrinth/*.mrpack
          loaders: fabric
          game-versions: ${{ env.MC_VERSION }}
      - name: Upload to Github Release
        uses: Shopify/upload-to-release@v1
        with:
          name: ${{ env.PACK_NAME }}.mrpack
          path: ./Pakku/build/modrinth/*.mrpack
          repo-token: ${{ secrets.GITHUB_TOKEN }}